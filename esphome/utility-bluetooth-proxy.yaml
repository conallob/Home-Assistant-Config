esphome:
  name: utility-bluetooth-proxy
  friendly_name: "Utility Bluetooth Proxy"

esp32:
  board: seeed_xiao_esp32c6
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable IPv6
network:
    enable_ipv6: true

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key_utility_bluetooth_proxy

ota:
  platform: esphome
  password: !secret ota_password_utility_bluetooth_proxy

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Bluetooth Proxy to Home Assistant
esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

bluetooth_proxy:
  active: true

# 24GHz mmWave Human Static Presence expansion board (LD2410),
# used to detect Huck's presence in the utility room.
# Board mounts directly onto the XIAO's D2/D3 pins.
uart:
  id: mmwave_uart
  tx_pin: GPIO21
  rx_pin: GPIO2
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2410:
  id: utility_room_mmwave

binary_sensor:
  - platform: ld2410
    has_target:
      name: "Presence"
    has_moving_target:
      name: "Moving Target"
    has_still_target:
      name: "Still Target"

sensor:
  - platform: ld2410
    moving_distance:
      name: "Moving Distance"
    still_distance:
      name: "Still Distance"
    moving_energy:
      name: "Moving Energy"
    still_energy:
      name: "Still Energy"
    detection_distance:
      name: "Detection Distance"

text_sensor:
  - platform: ld2410
    version:
      name: "Presence Sensor Firmware Version"

button:
  - platform: ld2410
    restart:
      name: "Presence Sensor Restart"

number:
  - platform: ld2410
    timeout:
      name: "Presence Sensor Timeout"
    max_move_distance_gate:
      name: "Presence Sensor Max Move Distance"
    max_still_distance_gate:
      name: "Presence Sensor Max Still Distance"
