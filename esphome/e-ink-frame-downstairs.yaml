
substitutions:
  # Device Info
  device_name: "e-ink-frame-downstairs"
  friendly_name: "E-Ink Frame Downstairs"

  # Pin Assignments for XIAO ESP32C6 to Waveshare e-Paper Driver HAT (Rev2.3)
  # Using hardware SPI pins for reliable communication
  # XIAO ESP32C6 pinout: https://wiki.seeedstudio.com/xiao_esp32c6_getting_started/
  # Waveshare HAT connector directly to XIAO expansion board
  #
  # DUPONT WIRE MAP (XIAO expansion board <-> Waveshare e-Paper Driver HAT 9-pin
  # connector). Confirmed against a labelled product photo of the actual Driver
  # HAT Rev2.3 board in this build: the 9-pin connector is silkscreened
  # PWR,BUSY,RST,DC,CS,CLK,DIN,GND,VCC (left to right), with a matching 9-wire
  # cable in that same colour order. This is the real cable for this board -
  # not a generic/assumed convention.
  #
  # | HAT Pin | Signal | Colour | XIAO Pin | GPIO   | Notes |
  # |---------|--------|--------|----------|--------|-------|
  # | 1       | PWR    | Purple | 3V3      | -      | No power_pin in ESPHome's waveshare_epaper component - tie PWR straight to 3V3 (same rail as VCC) rather than a GPIO. CURRENTLY DISCONNECTED - reconnect here. |
  # | 2       | BUSY   | Blue   | D5       | GPIO23 | Busy signal (ACTIVE LOW - must be inverted!) |
  # | 3       | RST    | Green  | D4       | GPIO22 | Reset |
  # | 4       | DC     | Yellow | D3       | GPIO21 | Data/Command |
  # | 5       | CS     | Orange | D2       | GPIO2  | Chip Select |
  # | 6       | CLK    | Grey   | D8       | GPIO19 | SPI SCK (hardware SPI) |
  # | 7       | DIN    | White  | D10      | GPIO18 | SPI MOSI (hardware SPI) |
  # | 8       | GND    | Black  | GND      | -      | |
  # | 9       | VCC    | Red    | 3V3      | -      | |
  #
  # If a wire ever comes loose again and colour alone isn't enough to confirm:
  # multimeter in continuity/beep mode, one probe on the HAT-side pin, the
  # other on the candidate XIAO pin - it beeps when you've found the right one.
  pin_clk: "GPIO19"   # D8 - SPI SCK (hardware SPI) - Grey wire
  pin_mosi: "GPIO18"  # D10 - SPI MOSI (hardware SPI) - White wire
  pin_cs: "GPIO2"     # D2 - Chip Select - Orange wire
  pin_dc: "GPIO21"    # D3 - Data/Command - Yellow wire
  pin_busy: "GPIO23"  # D5 - Busy signal (ACTIVE LOW - must be inverted!) - Blue wire
  pin_reset: "GPIO22" # D4 - Reset - Green wire

  # Deep Sleep
  gpio_deep_sleep_wake_up: "GPIO4"
  sleep_duration: "30min"

  # Location
  latitude: "53.1935777"
  longitude: "-6.120645"
  timezone: "Europe/Dublin"

  # Display - Waveshare 7.3" e-Paper HAT (G) 4-Color (800x480)
  # Actual display: HAT (G) with Black, White, Red, Yellow
  # Using 7.30in-f driver (no native HAT G support yet)
  # Color mapping applied in color: section to correct for driver differences
  waveshare_model: "7.30in-f"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  # Display refresh strategy:
  # - Initial refresh once after first time sync (ensures HA data is available)
  # - Scheduled refresh every ~7.5 minutes (8 times per hour)
  # - Refresh disabled when:
  #   - After 23:00 (11 PM)
  #   - Alarm is armed away
  #   - Nobody is home (zone.home has no persons)
  #   - Taku Sleep Mode is active (device enters deep sleep)
  # - Manual refresh available via button in Home Assistant
  on_boot:
    priority: -100  # Run after everything is initialized
    then:
      - delay: 5s  # Wait for HA connection and sensor updates
      - if:
          condition:
            binary_sensor.is_on: taku_sleep_mode
          then:
            - logger.log: "Woke from deep sleep but Taku Sleep Mode still active - going back to sleep"
            - delay: 2s
            - deep_sleep.enter: deep_sleep_control

esp32:
  board: seeed_xiao_esp32c6
  framework:
    type: esp-idf

# Enable logging
logger:
  level: DEBUG

# Enable IPv6
network:
  enable_ipv6: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key_e_ink_frame_downstairs

ota:
  - platform: esphome
    password: !secret ota_password_e_ink_frame_downstairs

web_server:
  port: 80

# SPI Configuration for e-ink display
spi:
  clk_pin: ${pin_clk}
  mosi_pin: ${pin_mosi}
  id: spi_bus

# Global to track if initial refresh has happened
globals:
  - id: initial_refresh_done
    type: bool
    restore_value: no
    initial_value: 'false'

# Time component
time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: ${timezone}
    on_time_sync:
      then:
        # Only refresh on first time sync after boot
        - if:
            condition:
              lambda: 'return !id(initial_refresh_done);'
            then:
              - logger.log: "Initial time sync - triggering first display refresh..."
              - delay: 3s  # Give sensors time to receive their initial values
              - component.update: eink_display
              - globals.set:
                  id: initial_refresh_done
                  value: 'true'
            else:
              - logger.log: "Time re-synced, skipping refresh (use scheduled refresh)"
    # Scheduled refresh every ~7.5 minutes
    # Disabled when: after 23:00, alarm armed away, or nobody home
    on_time:
      # First set: :00, :15, :30, :45
      - seconds: 0
        minutes: /15
        then:
          - script.execute: scheduled_refresh
      # Second set: :08, :23, :38, :53 (offset by ~7.5 min)
      - seconds: 0
        minutes: 8,23,38,53
        then:
          - script.execute: scheduled_refresh

# Script to handle conditional refresh
script:
  - id: scheduled_refresh
    then:
      - if:
          condition:
            lambda: |-
              auto time = id(homeassistant_time).now();

              // Skip refresh after 23:00 (11 PM)
              if (time.hour >= 23) {
                ESP_LOGI("display", "Skipping refresh: after 23:00");
                return false;
              }

              // Skip refresh if alarm is armed away
              if (id(alarm_state).has_state()) {
                std::string alarm = id(alarm_state).state;
                if (alarm == "armed_away") {
                  ESP_LOGI("display", "Skipping refresh: alarm armed away");
                  return false;
                }
              }

              // Skip refresh if nobody is home (zone.home persons is empty)
              if (id(zone_home_persons).has_state()) {
                std::string persons = id(zone_home_persons).state;
                // Empty list is "[]" or just empty
                if (persons == "[]" || persons.empty()) {
                  ESP_LOGI("display", "Skipping refresh: nobody home");
                  return false;
                }
              }

              ESP_LOGI("display", "Scheduled refresh: conditions met, updating display");
              return true;
          then:
            - component.update: eink_display

# Sun component for sunrise/sunset
sun:
  latitude: ${latitude}
  longitude: ${longitude}

# Define colors for Waveshare 7.3" e-Paper HAT (G) 4-Color display
# The display supports: Black, White, Red, Yellow
# Using 7.30in-f (7-color) driver with color mapping adjustments:
#   - What the driver calls "green" displays as Yellow on HAT (G)
#   - What the driver calls "blue" displays as Red on HAT (G)
#
# Color mapping for HAT (G):
#   Driver Color  -> HAT (G) Display
#   Black         -> Black
#   White         -> White
#   Green         -> Yellow
#   Blue          -> Red
#
color:
  - id: color_black
    red: 0%
    green: 0%
    blue: 0%
    white: 0%

  - id: color_white
    red: 100%
    green: 100%
    blue: 100%
    white: 100%

  # For HAT (G): Use driver's "green" channel to display YELLOW
  - id: color_yellow
    red: 0%
    green: 100%
    blue: 0%

  # For HAT (G): Use driver's "blue" channel to display RED
  - id: color_red
    red: 0%
    green: 0%
    blue: 100%

# Fonts - TRMNL-inspired typography
font:
  # Small text for labels and secondary info
  - file: "gfonts://Roboto"
    id: font_small
    size: 18

  # Regular body text
  - file: "gfonts://Roboto"
    id: font_body
    size: 22

  # Body text + Euro sign, for the account balance rows only.
  # NOTE: ESPHome's `glyphs` option *replaces* the font's default glyph
  # set rather than extending it, so this must list out the full set of
  # characters these rows need (not just the extra symbol) - it must not
  # be added to font_body directly, or every other character in that font
  # disappears.
  - file: "gfonts://Roboto"
    id: font_currency
    size: 22
    glyphs: "€0123456789.- ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"

  # Medium for section content
  - file: "gfonts://Roboto"
    id: font_medium
    size: 28

  # Medium-large for the (now compact) header time display
  - file: "gfonts://Roboto@700"
    id: font_time
    size: 40

  # Bold for section headers
  - file: "gfonts://Roboto@700"
    id: font_header
    size: 24

  # Extra large for temperature
  - file: "gfonts://Roboto@700"
    id: font_temp_large
    size: 56

  # Material Design Icons - Weather, sized for the header weather bubble.
  # font_icons_medium doesn't include the weather glyphs at all - using it
  # for weather icons previously rendered as blank squares.
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf'
    id: font_icons_weather
    size: 36
    glyphs:
      - "\U000F0590" # mdi:weather-cloudy
      - "\U000F0591" # mdi:weather-fog
      - "\U000F0592" # mdi:weather-hail
      - "\U000F0593" # mdi:weather-lightning
      - "\U000F067E" # mdi:weather-lightning-rainy
      - "\U000F0594" # mdi:weather-night
      - "\U000F0595" # mdi:weather-partlycloudy
      - "\U000F0596" # mdi:weather-pouring
      - "\U000F0597" # mdi:weather-rainy
      - "\U000F0598" # mdi:weather-snowy
      - "\U000F067F" # mdi:weather-snowy-rainy
      - "\U000F0599" # mdi:weather-sunny
      - "\U000F059D" # mdi:weather-windy
      - "\U000F059E" # mdi:weather-windy-variant
      - "\U000F0F31" # mdi:weather-night-partly-cloudy

  # Material Design Icons - Medium (UI elements)
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf'
    id: font_icons_medium
    size: 32
    glyphs:
      - "\U000F050F" # mdi:thermometer
      - "\U000F058E" # mdi:water-percent (humidity)
      - "\U000F0F54" # mdi:home-thermometer
      - "\U000F0A02" # mdi:calendar-today
      - "\U000F0954" # mdi:calendar-clock
      - "\U000F05CE" # mdi:wifi
      - "\U000F091F" # mdi:wifi-strength-1
      - "\U000F0922" # mdi:wifi-strength-4
      - "\U000F059B" # mdi:weather-sunset-down
      - "\U000F059C" # mdi:weather-sunset-up
      - "\U000F0238" # mdi:fire (heating)
      - "\U000F18D6" # mdi:sun-thermometer-outline
      - "\U000F0A72" # mdi:transmission-tower (grid)
      - "\U000F05A8" # mdi:white-balance-sunny (solar)
      - "\U000F140B" # mdi:solar-power

# Binary sensors for Home Assistant data
binary_sensor:
  # Taku Sleep Mode - triggers deep sleep when on
  - platform: homeassistant
    id: taku_sleep_mode
    entity_id: binary_sensor.taku_sleep_mode
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_on: taku_sleep_mode
            then:
              - logger.log: "Taku Sleep Mode activated - entering deep sleep"
              - delay: 2s  # Allow log message to be sent
              - deep_sleep.enter: deep_sleep_control

# Text sensors for Home Assistant data
text_sensor:
  # Weather condition
  - platform: homeassistant
    id: weather_condition
    entity_id: weather.home

  # Alarm state for refresh suppression
  - platform: homeassistant
    id: alarm_state
    entity_id: alarm_control_panel.hkc_alarm_system

  # Zone home person count (0 = nobody home)
  - platform: homeassistant
    id: zone_home_persons
    entity_id: zone.home
    attribute: persons

  # Hourly electricity usage breakdown for the power flow histogram
  # (see template/downstairs_display_hourly_energy.yaml). CSV format:
  # "hour,solar_wh,battery_discharged_wh,grid_import_wh,battery_charged_wh,grid_export_wh|..."
  - platform: homeassistant
    id: hourly_energy_csv
    entity_id: sensor.downstairs_display_hourly_energy
    attribute: hourly_csv

  # HKC alarm door/window contact sensors - state is text, "Open" or
  # "Closed" (IR/motion zones are deliberately excluded, only door and
  # window contacts are tracked here).
  - platform: homeassistant
    id: door_back
    entity_id: sensor.back_door

  - platform: homeassistant
    id: door_front
    entity_id: sensor.front_door

  - platform: homeassistant
    id: door_front_room
    entity_id: sensor.front_room

  - platform: homeassistant
    id: door_garage
    entity_id: sensor.garagedoor

  - platform: homeassistant
    id: door_kitchen_win
    entity_id: sensor.kitchen_win

  - platform: homeassistant
    id: door_roller
    entity_id: sensor.rollerdoor

  - platform: homeassistant
    id: door_shack
    entity_id: sensor.shack_door

  - platform: homeassistant
    id: door_sitting_room
    entity_id: sensor.sitting_roo

  - platform: homeassistant
    id: door_up_wins
    entity_id: sensor.up_wins

# Sensors for Home Assistant data
sensor:
  # Weather data
  - platform: homeassistant
    id: weather_temperature
    entity_id: weather.home
    attribute: temperature

  - platform: homeassistant
    id: weather_humidity
    entity_id: weather.home
    attribute: humidity

  # Outside temperature (OpenWeatherMap)
  - platform: homeassistant
    id: outside_temperature
    entity_id: sensor.openweathermap_temperature

  - platform: homeassistant
    id: outside_feels_like
    entity_id: sensor.openweathermap_apparent_temperature

  # Indoor temperatures - key rooms
  - platform: homeassistant
    id: hall_temperature
    entity_id: sensor.hall_sensor_temperature

  - platform: homeassistant
    id: sitting_room_temperature
    entity_id: sensor.sitting_room_sensor_temperature

  - platform: homeassistant
    id: kitchen_temperature
    entity_id: sensor.kitchen_sensor_temperature

  - platform: homeassistant
    id: family_room_temperature
    entity_id: sensor.family_room_sensor_temperature

  # Hall thermostat target
  - platform: homeassistant
    id: thermostat_target
    entity_id: sensor.hall_thermostat_target_temperature

  - platform: homeassistant
    id: thermostat_current
    entity_id: sensor.hall_thermostat_current_temperature

  # Utilities - Grid and Solar (both daily kWh, standardised units)
  - platform: homeassistant
    id: daily_grid_energy
    entity_id: sensor.downstairs_display_daily_grid_energy

  - platform: homeassistant
    id: solar_today
    entity_id: sensor.solis_energy_today

  # Hot water cylinder temperature
  - platform: homeassistant
    id: hot_water_temperature
    entity_id: sensor.hot_water_tank_temperature

  # Toshl - Revolut current account balances
  - platform: homeassistant
    id: genevieve_account_balance
    entity_id: sensor.genevieve_current_account_balance

  - platform: homeassistant
    id: reuben_account_balance
    entity_id: sensor.reuben_current_account_balance

  # WiFi Signal Sensor
  - platform: wifi_signal
    id: wifi_signal_strength
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

# E-Ink Display
display:
  - platform: waveshare_epaper
    id: eink_display
    cs_pin: ${pin_cs}
    dc_pin: ${pin_dc}
    busy_pin:
      number: ${pin_busy}
      inverted: true  # REQUIRED for 7.30in-f to prevent display damage!
    reset_pin: ${pin_reset}
    model: ${waveshare_model}
    update_interval: never
    rotation: 0°
    
    lambda: |-
      // ===========================================
      // TRMNL-INSPIRED INFO DASHBOARD
      // Waveshare 7.3" e-Paper HAT (G) 4-Color (800x480)
      // Layout: Header | Home Temps + Utilities/Electricity + Weather
      // ===========================================

      // Display dimensions
      const int SCREEN_WIDTH = 800;
      const int SCREEN_HEIGHT = 480;
      const int MARGIN = 12;
      const int SECTION_GAP = 12;

      // Clear display with white background
      it.fill(id(color_white));

      // Get current time
      auto time = id(homeassistant_time).now();

      if (!time.is_valid()) {
        it.printf(SCREEN_WIDTH/2, SCREEN_HEIGHT/2, id(font_header), id(color_black), TextAlign::CENTER,
                  "Waiting for Home Assistant...");
        return;
      }

      // ===== HEADER SECTION: 4 info bubbles (Time / Month / Date / Weather) =====
      // Bordered boxes rather than one solid bar, TRMNL/bubble-UI style -
      // distinct at a glance, more compact than the old full-width clock.

      // Weather icon mapping - computed once here (used by the header
      // weather bubble below, and reused as-is by the WEATHER column
      // further down).
      std::string weather_icon = "\U000F0599"; // default: sunny
      if (id(weather_condition).has_state()) {
        std::string condition = id(weather_condition).state;
        if (condition == "cloudy") weather_icon = "\U000F0590";
        else if (condition == "fog") weather_icon = "\U000F0591";
        else if (condition == "hail") weather_icon = "\U000F0592";
        else if (condition == "lightning") weather_icon = "\U000F0593";
        else if (condition == "lightning-rainy") weather_icon = "\U000F067E";
        else if (condition == "clear-night") weather_icon = "\U000F0594";
        else if (condition == "partlycloudy") weather_icon = "\U000F0595";
        else if (condition == "pouring") weather_icon = "\U000F0596";
        else if (condition == "rainy") weather_icon = "\U000F0597";
        else if (condition == "snowy") weather_icon = "\U000F0598";
        else if (condition == "snowy-rainy") weather_icon = "\U000F067F";
        else if (condition == "sunny") weather_icon = "\U000F0599";
        else if (condition == "windy") weather_icon = "\U000F059D";
        else if (condition == "windy-variant") weather_icon = "\U000F059E";
      }

      // Open doors/windows - HKC alarm contact sensors (text state,
      // "Open" or "Closed"). IR/motion zones are deliberately not part
      // of this list. Drawn below the electricity histogram (center
      // column), computed here since it doesn't depend on that column's
      // layout.
      const char* open_labels[9] = {"Back", "Front", "F.Room", "Garage", "Kitchen", "Roller", "Shack", "Sitting", "Up Win"};
      bool open_state[9] = {
        id(door_back).has_state() && id(door_back).state == "Open",
        id(door_front).has_state() && id(door_front).state == "Open",
        id(door_front_room).has_state() && id(door_front_room).state == "Open",
        id(door_garage).has_state() && id(door_garage).state == "Open",
        id(door_kitchen_win).has_state() && id(door_kitchen_win).state == "Open",
        id(door_roller).has_state() && id(door_roller).state == "Open",
        id(door_shack).has_state() && id(door_shack).state == "Open",
        id(door_sitting_room).has_state() && id(door_sitting_room).state == "Open",
        id(door_up_wins).has_state() && id(door_up_wins).state == "Open",
      };
      int open_count = 0;
      std::string open_names = "";
      const int OPEN_NAMES_SHOWN = 5;  // center column is wide enough for several names before truncating
      for (int i = 0; i < 9; i++) {
        if (open_state[i]) {
          if (open_count < OPEN_NAMES_SHOWN) {
            if (!open_names.empty()) open_names += ", ";
            open_names += open_labels[i];
          }
          open_count++;
        }
      }
      if (open_count > OPEN_NAMES_SHOWN) {
        char more_buf[16];
        snprintf(more_buf, sizeof(more_buf), " +%d", open_count - OPEN_NAMES_SHOWN);
        open_names += more_buf;
      }

      const int BUBBLE_TOP = 6;
      const int BUBBLE_HEIGHT = 118;  // tall enough for the full weather bubble (icon/temp/condition/feels/humidity)
      const int BUBBLE_GAP = 10;
      int bubble_w = (SCREEN_WIDTH - 2 * MARGIN - BUBBLE_GAP * 3) / 4;

      int bubble1_x = MARGIN;
      int bubble2_x = bubble1_x + bubble_w + BUBBLE_GAP;
      int bubble3_x = bubble2_x + bubble_w + BUBBLE_GAP;
      int bubble4_x = bubble3_x + bubble_w + BUBBLE_GAP;

      // Bubble 1: Time
      it.rectangle(bubble1_x, BUBBLE_TOP, bubble_w, BUBBLE_HEIGHT, id(color_black));
      it.printf(bubble1_x + 8, BUBBLE_TOP + 6, id(font_small), id(color_red), TextAlign::TOP_LEFT, "TIME");
      it.printf(bubble1_x + 8, BUBBLE_TOP + 26, id(font_time), id(color_black), TextAlign::TOP_LEFT,
                "%02d:%02d", time.hour, time.minute);

      // Bubble 2: Month
      it.rectangle(bubble2_x, BUBBLE_TOP, bubble_w, BUBBLE_HEIGHT, id(color_black));
      it.printf(bubble2_x + 8, BUBBLE_TOP + 6, id(font_small), id(color_red), TextAlign::TOP_LEFT, "MONTH");
      it.strftime(bubble2_x + 8, BUBBLE_TOP + 26, id(font_medium), id(color_black), TextAlign::TOP_LEFT, "%B", time);

      // Bubble 3: Date (weekday label, day-of-month as the big value)
      it.rectangle(bubble3_x, BUBBLE_TOP, bubble_w, BUBBLE_HEIGHT, id(color_black));
      it.strftime(bubble3_x + 8, BUBBLE_TOP + 6, id(font_small), id(color_red), TextAlign::TOP_LEFT, "%A", time);
      it.strftime(bubble3_x + 8, BUBBLE_TOP + 26, id(font_medium), id(color_black), TextAlign::TOP_LEFT, "%d", time);

      // Bubble 4: Weather (icon, temperature, condition, feels-like, humidity -
      // consolidated here from the old separate WEATHER column, which was
      // dropped to avoid showing the same weather info twice. Uses
      // font_icons_weather (not font_icons_medium, which doesn't have the
      // weather glyphs and rendered as a blank square).
      it.rectangle(bubble4_x, BUBBLE_TOP, bubble_w, BUBBLE_HEIGHT, id(color_black));
      it.printf(bubble4_x + 8, BUBBLE_TOP + 6, id(font_small), id(color_red), TextAlign::TOP_LEFT, "WEATHER");
      it.printf(bubble4_x + 8, BUBBLE_TOP + 24, id(font_icons_weather), id(color_black), TextAlign::TOP_LEFT,
                "%s", weather_icon.c_str());
      if (id(outside_temperature).has_state()) {
        it.printf(bubble4_x + bubble_w - 8, BUBBLE_TOP + 30, id(font_medium), id(color_black), TextAlign::TOP_RIGHT,
                  "%.0f°C", id(outside_temperature).state);
      } else {
        it.printf(bubble4_x + bubble_w - 8, BUBBLE_TOP + 30, id(font_medium), id(color_black), TextAlign::TOP_RIGHT, "--°C");
      }

      // Weather condition text
      if (id(weather_condition).has_state()) {
        std::string cond = id(weather_condition).state;
        if (cond.length() > 0) {
          cond[0] = toupper(cond[0]);
        }
        it.printf(bubble4_x + 8, BUBBLE_TOP + 68, id(font_small), id(color_black), TextAlign::TOP_LEFT,
                  "%s", cond.c_str());
      }

      // Feels-like and humidity, combined onto one line
      if (id(outside_feels_like).has_state() || id(weather_humidity).has_state()) {
        std::string feels_humidity = "";
        if (id(outside_feels_like).has_state()) {
          char buf[16];
          snprintf(buf, sizeof(buf), "Feels %.0f°", id(outside_feels_like).state);
          feels_humidity += buf;
        }
        if (id(weather_humidity).has_state()) {
          if (!feels_humidity.empty()) feels_humidity += "  ";
          char buf[16];
          snprintf(buf, sizeof(buf), "%.0f%% RH", id(weather_humidity).state);
          feels_humidity += buf;
        }
        it.printf(bubble4_x + 8, BUBBLE_TOP + 90, id(font_small), id(color_black), TextAlign::TOP_LEFT,
                  "%s", feels_humidity.c_str());
      }

      // ===== LEFT COLUMN (Home Sensors) =====
      int left_col_x = MARGIN;
      int left_col_width = 130;
      int content_y = BUBBLE_TOP + BUBBLE_HEIGHT + 12;

      // Home section header
      it.printf(left_col_x, content_y, id(font_header), id(color_red), TextAlign::TOP_LEFT, "HOME");
      it.line(left_col_x, content_y + 26, left_col_x + left_col_width, content_y + 26, id(color_red));

      int home_y = content_y + 35;
      int row_height = 26;

      // Heating status (current -> target)
      if (id(thermostat_current).has_state() && id(thermostat_target).has_state()) {
        it.printf(left_col_x, home_y, id(font_small), id(color_black), TextAlign::TOP_LEFT, "Heat");
        it.printf(left_col_x + left_col_width, home_y, id(font_small), id(color_black), TextAlign::TOP_RIGHT,
                  "%.0f→%.0f°", id(thermostat_current).state, id(thermostat_target).state);
      }
      home_y += row_height + 4;

      // Hall
      if (id(hall_temperature).has_state()) {
        it.printf(left_col_x, home_y, id(font_small), id(color_black), TextAlign::TOP_LEFT, "Hall");
        it.printf(left_col_x + left_col_width, home_y, id(font_small), id(color_black), TextAlign::TOP_RIGHT,
                  "%.1f°", id(hall_temperature).state);
      }
      home_y += row_height;

      // Sitting Room
      if (id(sitting_room_temperature).has_state()) {
        it.printf(left_col_x, home_y, id(font_small), id(color_black), TextAlign::TOP_LEFT, "Sitting");
        it.printf(left_col_x + left_col_width, home_y, id(font_small), id(color_black), TextAlign::TOP_RIGHT,
                  "%.1f°", id(sitting_room_temperature).state);
      }
      home_y += row_height;

      // Kitchen
      if (id(kitchen_temperature).has_state()) {
        it.printf(left_col_x, home_y, id(font_small), id(color_black), TextAlign::TOP_LEFT, "Kitchen");
        it.printf(left_col_x + left_col_width, home_y, id(font_small), id(color_black), TextAlign::TOP_RIGHT,
                  "%.1f°", id(kitchen_temperature).state);
      }
      home_y += row_height;

      // Family Room
      if (id(family_room_temperature).has_state()) {
        it.printf(left_col_x, home_y, id(font_small), id(color_black), TextAlign::TOP_LEFT, "Family");
        it.printf(left_col_x + left_col_width, home_y, id(font_small), id(color_black), TextAlign::TOP_RIGHT,
                  "%.1f°", id(family_room_temperature).state);
      }
      home_y += row_height;

      // Hot Water (bottom item in this list - red when > 35°C)
      if (id(hot_water_temperature).has_state()) {
        float hot_water_temp = id(hot_water_temperature).state;
        Color hot_water_color = hot_water_temp > 35.0f ? id(color_red) : id(color_black);
        it.printf(left_col_x, home_y, id(font_small), hot_water_color, TextAlign::TOP_LEFT, "Water");
        it.printf(left_col_x + left_col_width, home_y, id(font_small), hot_water_color, TextAlign::TOP_RIGHT,
                  "%.1f°", hot_water_temp);
      }

      // ===== REVOLUT KIDS (bottom-left corner, pinned above the footer) =====
      int kids_row_h = 22;
      int kids_block_h = 22 + 8 + kids_row_h * 2;  // header line + gap + 2 rows
      int kids_header_y = (SCREEN_HEIGHT - 35) - 10 - kids_block_h;

      it.printf(left_col_x, kids_header_y, id(font_header), id(color_red), TextAlign::TOP_LEFT, "KIDS");
      it.line(left_col_x, kids_header_y + 22, left_col_x + left_col_width, kids_header_y + 22, id(color_red));

      int kids_y = kids_header_y + 30;

      // Genevieve Account Balance
      it.printf(left_col_x, kids_y, id(font_small), id(color_black), TextAlign::TOP_LEFT, "Gen");
      if (id(genevieve_account_balance).has_state()) {
        it.printf(left_col_x + left_col_width, kids_y, id(font_currency), id(color_black), TextAlign::TOP_RIGHT,
                  "€%.2f", id(genevieve_account_balance).state);
      } else {
        it.printf(left_col_x + left_col_width, kids_y, id(font_currency), id(color_black), TextAlign::TOP_RIGHT, "--");
      }

      kids_y += kids_row_h;

      // Reuben Account Balance
      it.printf(left_col_x, kids_y, id(font_small), id(color_black), TextAlign::TOP_LEFT, "Reu");
      if (id(reuben_account_balance).has_state()) {
        it.printf(left_col_x + left_col_width, kids_y, id(font_currency), id(color_black), TextAlign::TOP_RIGHT,
                  "€%.2f", id(reuben_account_balance).state);
      } else {
        it.printf(left_col_x + left_col_width, kids_y, id(font_currency), id(color_black), TextAlign::TOP_RIGHT, "--");
      }

      // ===== CENTER COLUMN (Utilities) =====
      int center_col_x = left_col_x + left_col_width + SECTION_GAP;
      // Fills the rest of the row - the WEATHER column was removed (its
      // content moved into the header weather bubble), so this now absorbs
      // that freed width instead of a fixed ~2/3 split.
      int center_col_width = SCREEN_WIDTH - 2 * MARGIN - left_col_width - SECTION_GAP;

      // Utilities section header
      it.printf(center_col_x, content_y, id(font_header), id(color_red), TextAlign::TOP_LEFT, "UTILITIES");
      it.line(center_col_x, content_y + 26, center_col_x + center_col_width, content_y + 26, id(color_red));

      int util_y = content_y + 40;
      int util_row = 38;

      // Grid Energy Today (daily kWh, matching Solar Today's units)
      it.printf(center_col_x, util_y, id(font_icons_medium), id(color_black), TextAlign::TOP_LEFT, "\U000F0A72");
      it.printf(center_col_x + 40, util_y + 4, id(font_body), id(color_black), TextAlign::TOP_LEFT, "Grid Today");
      if (id(daily_grid_energy).has_state()) {
        it.printf(center_col_x + center_col_width, util_y + 4, id(font_body), id(color_black), TextAlign::TOP_RIGHT,
                  "%.1f kWh", id(daily_grid_energy).state);
      } else {
        it.printf(center_col_x + center_col_width, util_y + 4, id(font_body), id(color_black), TextAlign::TOP_RIGHT, "-- kWh");
      }

      util_y += util_row;

      // Solar Yield Today
      it.printf(center_col_x, util_y, id(font_icons_medium), id(color_yellow), TextAlign::TOP_LEFT, "\U000F05A8");
      it.printf(center_col_x + 40, util_y + 4, id(font_body), id(color_black), TextAlign::TOP_LEFT, "Solar Today");
      if (id(solar_today).has_state()) {
        it.printf(center_col_x + center_col_width, util_y + 4, id(font_body), id(color_black), TextAlign::TOP_RIGHT,
                  "%.1f kWh", id(solar_today).state);
      } else {
        it.printf(center_col_x + center_col_width, util_y + 4, id(font_body), id(color_black), TextAlign::TOP_RIGHT, "-- kWh");
      }

      // ===== ELECTRICITY USAGE HISTOGRAM (hourly, 08:00-23:00) =====
      // Stacked bars per hour: above the baseline, Solar (yellow) +
      // Battery discharged (red) + Grid import (black); below the
      // baseline, Battery charged (red) + Grid export (black/yellow/white
      // hatch). This panel only has 4 inks (Black/White/Red/Yellow) - no
      // true blue - so battery uses red on both sides of the baseline,
      // distinguished by position rather than a second color.
      // Range is trimmed to 08:00-23:00 (Day + Peak tariff hours) to fit
      // this column's width and to line up exactly with the Night
      // boundaries. Dotted vertical lines mark the tariff changeovers:
      // black at 08:00/23:00 (Night ends/starts), red at 17:00/19:00
      // (Peak starts/ends).
      const int HIST_START_HOUR = 8;
      const int HIST_END_HOUR = 23;  // exclusive
      const int HIST_HOURS = HIST_END_HOUR - HIST_START_HOUR;

      // [hour index][solar, battery_discharged, grid_import, battery_charged, grid_export], all in Wh
      int hourly_wh[HIST_HOURS][5] = {{0}};

      if (id(hourly_energy_csv).has_state()) {
        std::string csv = id(hourly_energy_csv).state;
        size_t seg_start = 0;
        while (seg_start <= csv.size()) {
          size_t seg_end = csv.find('|', seg_start);
          if (seg_end == std::string::npos) seg_end = csv.size();
          std::string segment = csv.substr(seg_start, seg_end - seg_start);

          int fields[6];
          int field_count = 0;
          size_t f_start = 0;
          while (field_count < 6 && f_start <= segment.size()) {
            size_t f_end = segment.find(',', f_start);
            if (f_end == std::string::npos) f_end = segment.size();
            std::string field = segment.substr(f_start, f_end - f_start);
            if (!field.empty()) {
              fields[field_count++] = atoi(field.c_str());
            }
            if (f_end == segment.size()) break;
            f_start = f_end + 1;
          }

          if (field_count == 6) {
            int h = fields[0];
            if (h >= HIST_START_HOUR && h < HIST_END_HOUR) {
              int idx = h - HIST_START_HOUR;
              for (int i = 0; i < 5; i++) hourly_wh[idx][i] = fields[i + 1];
            }
          }

          if (seg_end == csv.size()) break;
          seg_start = seg_end + 1;
        }
      }

      int hist_max_wh = 200;  // floor so a near-empty day doesn't blow up the scale
      for (int i = 0; i < HIST_HOURS; i++) {
        int pos = hourly_wh[i][0] + hourly_wh[i][1] + hourly_wh[i][2];
        int neg = hourly_wh[i][3] + hourly_wh[i][4];
        if (pos > hist_max_wh) hist_max_wh = pos;
        if (neg > hist_max_wh) hist_max_wh = neg;
      }

      int hist_y = util_y + util_row + 14;
      int hist_half_height = 45;  // trimmed back down - the taller header weather bubble eats into vertical space
      int hist_baseline = hist_y + hist_half_height;
      int hist_bottom = hist_baseline + hist_half_height;

      int hist_bar_pitch = center_col_width / HIST_HOURS;
      int hist_bar_w = hist_bar_pitch - 2;

      for (int i = 0; i < HIST_HOURS; i++) {
        int bar_x = center_col_x + i * hist_bar_pitch;

        // Positive stack, bottom-up from the baseline: solar, battery discharged, grid import
        int y = hist_baseline;
        int solar_h = (int) ((float) hourly_wh[i][0] / hist_max_wh * hist_half_height);
        if (solar_h > 0) {
          it.filled_rectangle(bar_x, y - solar_h, hist_bar_w, solar_h, id(color_yellow));
        }
        y -= solar_h;
        int batt_dis_h = (int) ((float) hourly_wh[i][1] / hist_max_wh * hist_half_height);
        if (batt_dis_h > 0) {
          it.filled_rectangle(bar_x, y - batt_dis_h, hist_bar_w, batt_dis_h, id(color_red));
        }
        y -= batt_dis_h;
        int grid_imp_h = (int) ((float) hourly_wh[i][2] / hist_max_wh * hist_half_height);
        if (grid_imp_h > 0) {
          it.filled_rectangle(bar_x, y - grid_imp_h, hist_bar_w, grid_imp_h, id(color_black));
        }

        // Negative stack, top-down from the baseline: battery charged, grid export (hatched)
        y = hist_baseline;
        int batt_chg_h = (int) ((float) hourly_wh[i][3] / hist_max_wh * hist_half_height);
        if (batt_chg_h > 0) {
          it.filled_rectangle(bar_x, y, hist_bar_w, batt_chg_h, id(color_red));
        }
        y += batt_chg_h;
        int grid_exp_h = (int) ((float) hourly_wh[i][4] / hist_max_wh * hist_half_height);
        if (grid_exp_h > 0) {
          for (int sy = y; sy < y + grid_exp_h; sy += 6) {
            it.line(bar_x, sy, bar_x + hist_bar_w, sy, id(color_black));
            if (sy + 3 < y + grid_exp_h) {
              it.line(bar_x, sy + 3, bar_x + hist_bar_w, sy + 3, id(color_yellow));
            }
          }
          it.rectangle(bar_x, y, hist_bar_w, grid_exp_h, id(color_black));
        }
      }

      // Baseline (zero line)
      it.line(center_col_x, hist_baseline, center_col_x + center_col_width, hist_baseline, id(color_black));

      // Tariff changeover markers (dotted vertical lines)
      int tariff_hours[4] = {8, 23, 17, 19};
      bool tariff_is_peak[4] = {false, false, true, true};
      for (int t = 0; t < 4; t++) {
        int tx = center_col_x + (tariff_hours[t] - HIST_START_HOUR) * hist_bar_pitch;
        Color tariff_color = tariff_is_peak[t] ? id(color_red) : id(color_black);
        for (int sy = hist_y; sy < hist_bottom; sy += 6) {
          it.line(tx, sy, tx, sy + 3, tariff_color);
        }
      }

      // Hour axis labels at the tariff changeover hours
      int hist_label_y = hist_bottom + 4;
      int label_hours[5] = {8, 12, 17, 19, 23};
      for (int l = 0; l < 5; l++) {
        int lx = center_col_x + (label_hours[l] - HIST_START_HOUR) * hist_bar_pitch;
        it.printf(lx, hist_label_y, id(font_small), id(color_black), TextAlign::TOP_CENTER, "%d", label_hours[l]);
      }

      // ===== OPEN DOORS/WINDOWS (below the electricity histogram, same column) =====
      int open_y = hist_label_y + 22;
      it.printf(center_col_x, open_y, id(font_small), id(color_red), TextAlign::TOP_LEFT, "OPEN DOORS/WINDOWS");
      if (open_count == 0) {
        it.printf(center_col_x, open_y + 20, id(font_body), id(color_black), TextAlign::TOP_LEFT, "All closed");
      } else {
        it.printf(center_col_x, open_y + 20, id(font_body), id(color_red), TextAlign::TOP_LEFT, "%s", open_names.c_str());
      }

      // ===== FOOTER =====
      int footer_y = SCREEN_HEIGHT - 35;
      it.line(MARGIN, footer_y, SCREEN_WIDTH - MARGIN, footer_y, id(color_black));

      // Last updated time
      it.strftime(MARGIN, footer_y + 8, id(font_small), id(color_black), TextAlign::TOP_LEFT,
                  "Updated %H:%M", time);

      // WiFi signal indicator
      if (id(wifi_signal_strength).has_state()) {
        float rssi = id(wifi_signal_strength).state;
        std::string wifi_icon = "\U000F091F"; // weak
        if (rssi > -50) wifi_icon = "\U000F0922"; // strong
        else if (rssi > -70) wifi_icon = "\U000F05CE"; // medium
        it.printf(SCREEN_WIDTH - MARGIN, footer_y + 5, id(font_icons_medium), id(color_black), TextAlign::TOP_RIGHT,
                  "%s", wifi_icon.c_str());
      }

# Deep Sleep Configuration
# Controlled by binary_sensor.taku_sleep_mode from Home Assistant
# When sleep mode is enabled, the device enters deep sleep until morning (07:00)
# when the automation disables sleep mode and the device wakes up
deep_sleep:
  id: deep_sleep_control
  # Sleep until woken by Home Assistant turning off sleep mode
  # The device will wake periodically to check if sleep mode is still on
  sleep_duration: ${sleep_duration}
  wakeup_pin:
    number: ${gpio_deep_sleep_wake_up}
  wakeup_pin_mode: KEEP_AWAKE

# Buttons to control display update
button:
  - platform: template
    name: "${friendly_name} Refresh Display"
    icon: "mdi:refresh"
    on_press:
      then:
        - logger.log: "Manual display refresh triggered"
        - component.update: eink_display

  - platform: template
    name: "${friendly_name} Deep Sleep"
    icon: "mdi:sleep"
    on_press:
      then:
        - logger.log: "Manual deep sleep triggered"
        - deep_sleep.enter: deep_sleep_control

  - platform: restart
    name: "${friendly_name} Restart"
