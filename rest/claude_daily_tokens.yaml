# Anthropic Claude API - Daily Token Usage
# Polls the Usage Report API for today's token consumption (resets at UTC midnight).
#
# Requires an Admin API key (sk-ant-admin-...) stored in secrets.yaml as:
#   anthropic_admin_api_key: sk-ant-admin-...
#
# Create one at: https://console.anthropic.com/settings/admin-keys
#
# Response fields per result item:
#   uncached_input_tokens       - fresh input tokens (not from cache)
#   cache_read_input_tokens     - input tokens served from prompt cache
#   cache_creation.*            - tokens written into prompt cache (1h / 5m TTL)
#   output_tokens               - generated response tokens

resource_template: "https://api.anthropic.com/v1/organizations/usage_report/messages?starting_at={{ utcnow().strftime('%Y-%m-%dT00:00:00Z') }}&bucket_width=1d&limit=1"
headers:
  x-api-key: !secret anthropic_admin_api_key
  anthropic-version: "2023-06-01"
method: GET
scan_interval: 1800  # Update every 30 minutes

sensor:
  - name: "Claude Daily Input Tokens"
    unique_id: claude_daily_input_tokens
    value_template: >-
      {% set ns = namespace(total=0) %}
      {% for bucket in value_json.data %}
        {% for r in bucket.results %}
          {% set ns.total = ns.total + (r.uncached_input_tokens | int(0)) %}
        {% endfor %}
      {% endfor %}
      {{ ns.total }}
    unit_of_measurement: "tokens"
    state_class: measurement
    icon: mdi:import

  - name: "Claude Daily Cached Input Tokens"
    unique_id: claude_daily_cached_input_tokens
    value_template: >-
      {% set ns = namespace(total=0) %}
      {% for bucket in value_json.data %}
        {% for r in bucket.results %}
          {% set ns.total = ns.total + (r.cache_read_input_tokens | int(0)) %}
        {% endfor %}
      {% endfor %}
      {{ ns.total }}
    unit_of_measurement: "tokens"
    state_class: measurement
    icon: mdi:cached

  - name: "Claude Daily Cache Write Tokens"
    unique_id: claude_daily_cache_write_tokens
    value_template: >-
      {% set ns = namespace(total=0) %}
      {% for bucket in value_json.data %}
        {% for r in bucket.results %}
          {% set cc = r.cache_creation | default({}) %}
          {% set ns.total = ns.total
            + ((cc.ephemeral_1h_input_tokens | default(0)) | int)
            + ((cc.ephemeral_5m_input_tokens | default(0)) | int) %}
        {% endfor %}
      {% endfor %}
      {{ ns.total }}
    unit_of_measurement: "tokens"
    state_class: measurement
    icon: mdi:database-export

  - name: "Claude Daily Output Tokens"
    unique_id: claude_daily_output_tokens
    value_template: >-
      {% set ns = namespace(total=0) %}
      {% for bucket in value_json.data %}
        {% for r in bucket.results %}
          {% set ns.total = ns.total + (r.output_tokens | int(0)) %}
        {% endfor %}
      {% endfor %}
      {{ ns.total }}
    unit_of_measurement: "tokens"
    state_class: measurement
    icon: mdi:export
