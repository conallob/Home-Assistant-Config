# Anthropic Claude API - Daily Cost
# Polls the Cost Report API for today's spend (resets at UTC midnight).
#
# Requires an Admin API key (sk-ant-admin-...) stored in secrets.yaml as:
#   anthropic_admin_api_key: sk-ant-admin-...
#
# The Cost API returns amounts in minor currency units (cents for USD).
# The value_template divides by 100 to produce a dollar amount.
# If your numbers look off by 100x, adjust the divisor below.

resource_template: "https://api.anthropic.com/v1/organizations/cost_report?starting_at={{ utcnow().strftime('%Y-%m-%dT00:00:00Z') }}&bucket_width=1d&limit=1"
headers:
  x-api-key: !secret anthropic_admin_api_key
  anthropic-version: "2023-06-01"
method: GET
scan_interval: 1800  # Update every 30 minutes

sensor:
  - name: "Claude Daily Cost"
    unique_id: claude_daily_cost
    value_template: >-
      {% set ns = namespace(total=0) %}
      {% for bucket in value_json.data %}
        {% for r in bucket.results %}
          {% set ns.total = ns.total + (r.amount | float(0)) %}
        {% endfor %}
      {% endfor %}
      {{ (ns.total / 100) | round(4) }}
    unit_of_measurement: "USD"
    device_class: monetary
    state_class: measurement
    icon: mdi:currency-usd
