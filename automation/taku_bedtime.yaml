id: '1698610029172'
alias: Taku Bedtime
description: >
  Bedtime routine replacing Apple Shortcuts "Taku Bedtime".
  Turns off Front Garden, Back Garden, Bathroom, and all remaining lights,
  then leaves bathroom sink on as a nightlight at 33%.
  Triggered by Hue button long-press (after sunset) or mobile app action.
triggers:
  - trigger: device
    device_id: b14b7c6afc5785c4323a208916939bb2
    domain: hue
    type: long_release
    subtype: 4
    unique_id: 0984d4be-25ad-448e-ad50-eac92cd4662c
  - trigger: event
    event_type: ios.action_fired
    event_data:
      actionName: taku_bedtime
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: taku_bedtime
conditions:
  - condition: or
    conditions:
      - condition: template
        value_template: "{{ trigger.platform != 'device' }}"
      - condition: sun
        after: sunset
actions:
  - action: light.turn_off
    target:
      area_id:
        - front_garden
  - action: light.turn_off
    target:
      area_id:
        - back_garden
  - action: light.turn_off
    target:
      area_id:
        - bathroom
  - action: light.turn_off
    data: {}
  - action: light.turn_on
    target:
      entity_id: light.bathroom_sink
    data:
      brightness_pct: 33
mode: single
