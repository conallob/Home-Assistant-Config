id: '1783847882940'
alias: Snapmaker - Turn Off When Idle
description: Turns off the Snapmaker 3D printer if it has been powered on but idle (not printing) for 45 minutes
triggers:
  - trigger: state
    entity_id: binary_sensor.snapmaker_idle
    to: 'on'
    # binary_sensor.snapmaker_idle lags real idle onset by up to 5 min (the
    # power sensor's moving average window), so 40 here + that 5 min lag
    # keeps total idle-to-shutoff time at ~45 min.
    for:
      hours: 0
      minutes: 40
      seconds: 0
conditions: []
actions:
  - action: switch.turn_off
    target:
      entity_id: switch.snapmaker
  - action: notify.conall_phone
    data:
      title: Snapmaker Turned Off
      message: The Snapmaker was idle for 45 minutes and has been powered off.
mode: single
