sources:

  syslog_tcp:
    type: syslog
    mode: tcp
    address: 0.0.0.0:514

  syslog_udp:
    type: syslog
    mode: udp
    address: 0.0.0.0:514

sinks:
  console:
    type: console
    inputs:
      - syslog_tcp
      - syslog_udp
    target: stdout
    encoding:
      codec: json

  gcp:
    type: gcp_stackdriver_logs
    inputs:
      - syslog_tcp
      - syslog_udp
    project_id: "unix-logs-storage"
    log_id: "syslog"
    credentials_path: "/config/vector/gcp/credentials.json"
    resource:
      type: "global"
